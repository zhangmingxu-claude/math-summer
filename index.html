<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FFF0F0">
<title>🌻 乐乐的数学冒险</title>
<link rel="manifest" href="manifest.json">
<style>
/* ========== 护眼配色系统 ========== */
:root {
  --bg:         #FFF5F5;
  --card:       rgba(255,255,255,0.85);
  --card-solid: #FFFBFB;
  --pink-light: #FFE4E6;
  --pink:       #FFB6C1;
  --pink-deep:  #FF9AA2;
  --pink-glow:  #FFD1D7;
  --yellow-light:#FFF8DC;
  --yellow:     #FFE4A0;
  --yellow-deep:#FFCC66;
  --blue-light: #F0F4FF;
  --blue:       #B5D8FF;
  --blue-deep:  #7AB8F5;
  --text:       #4A4458;
  --text-light: #8A8498;
  --success:    #B5EAD7;
  --error:      #FFC4BF;
  --gold:       #FFD700;
  --star:       #FFB347;
  --lock:       #E8E0D8;
  --radius-sm:  12px;
  --radius:     20px;
  --radius-lg:  28px;
  --shadow-sm:  0 2px 8px rgba(180,140,140,0.08);
  --shadow:     0 4px 20px rgba(180,140,140,0.12);
  --shadow-lg:  0 8px 32px rgba(180,140,140,0.16);
  --font: 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font);
  background: linear-gradient(170deg, #FFF5F5 0%, #FFF0F5 30%, #F5F0FF 60%, #FFF5F0 100%);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}
/* 背景装饰 */
.bg-decorations { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:0; overflow:hidden; }
.bg-float {
  position:absolute; border-radius:50%; opacity:0.35;
  animation: bgFloat linear infinite;
}
@keyframes bgFloat {
  0% { transform:translateY(0) translateX(0) scale(1); }
  25% { transform:translateY(-30px) translateX(15px) scale(1.05); }
  50% { transform:translateY(-15px) translateX(-10px) scale(0.95); }
  75% { transform:translateY(-40px) translateX(-20px) scale(1.02); }
  100% { transform:translateY(0) translateX(0) scale(1); }
}
/* ========== 页面容器 ========== */
.page { display:none; min-height:100vh; padding-bottom:20px; position:relative; z-index:1; }
.page.active { display:block; animation: pageIn 0.45s cubic-bezier(0.22,0.61,0.36,1); }
@keyframes pageIn {
  from { opacity:0; transform:translateY(20px) scale(0.96); }
  to { opacity:1; transform:translateY(0) scale(1); }
}

/* ========== 顶部导航 ========== */
.topbar {
  background: rgba(255,255,255,0.78);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 14px 20px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
  border-bottom: 1px solid rgba(255,182,193,0.3);
  box-shadow: 0 1px 12px rgba(255,154,162,0.08);
}
.topbar .title { font-size:21px; font-weight:700; letter-spacing:0.5px; }
.topbar .stats { display:flex; gap:18px; align-items:center; }
.topbar .stat {
  display:flex; align-items:center; gap:5px; font-size:14px; font-weight:600;
  background: rgba(255,255,255,0.7); padding:5px 12px; border-radius:20px;
  box-shadow: var(--shadow-sm);
}
.topbar .stat .icon { font-size:18px; animation: iconBounce 2s ease-in-out infinite; }
@keyframes iconBounce {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-3px); }
}

/* ========== 主页地图 ========== */
.map-header { text-align:center; padding: 28px 20px 10px; position:relative; z-index:1; }
.map-header h1 { font-size:28px; margin-bottom:6px; }
.map-header .subtitle { font-size:14px; color:var(--text-light); }
.legend { display:flex; justify-content:center; gap:18px; flex-wrap:wrap; margin:14px 0 8px; font-size:12px; }
.legend span { display:flex; align-items:center; gap:5px; background:rgba(255,255,255,0.6); padding:4px 10px; border-radius:12px; }
.legend .dot { width:14px; height:14px; border-radius:50%; display:inline-block; }

.days-grid {
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  padding: 0 16px;
  max-width: 600px;
  margin: 0 auto 24px;
  position:relative; z-index:1;
}
.day-cell {
  aspect-ratio:1;
  border-radius: var(--radius);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition: all 0.3s cubic-bezier(0.22,0.61,0.36,1);
  position:relative;
  font-weight:700;
  font-size:13px;
  text-align:center;
  gap: 2px;
  box-shadow: var(--shadow);
  border: 2px solid transparent;
  overflow:hidden;
}
.day-cell::after {
  content:''; position:absolute; top:0; left:0; right:0; bottom:0;
  background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.6) 0%, transparent 60%);
  border-radius:inherit; pointer-events:none;
}
.day-cell:active { transform:scale(0.92); transition: all 0.1s; }
.day-cell .day-num { font-size:20px; position:relative; z-index:1; }
.day-cell .day-label { font-size:10px; opacity:0.85; position:relative; z-index:1; }
.day-cell .stars-row { font-size:11px; margin-top:2px; position:relative; z-index:1; }

.day-cell.study {
  background: linear-gradient(145deg, #FFF5F5 0%, #FFE8EA 100%);
  border-color: rgba(255,182,193,0.5);
}
.day-cell.study:hover:not(.locked) {
  transform:translateY(-4px); box-shadow: 0 10px 28px rgba(255,154,162,0.25);
  border-color: var(--pink-deep);
}
.day-cell.study.done { background: linear-gradient(145deg, #E8F8F0 0%, #B5EAD7 100%); border-color: #90D5BB; }
.day-cell.study.done:hover:not(.locked) { box-shadow: 0 10px 28px rgba(144,213,187,0.3); }
.day-cell.study.current {
  border-color: var(--pink-deep); box-shadow: 0 0 0 6px rgba(255,154,162,0.2);
  animation: cellPulse 2.2s ease-in-out infinite;
}
.day-cell.study.locked { background: linear-gradient(145deg, #F0EDE8 0%, #E8E0D8 100%); opacity:0.5; cursor:not-allowed; }

.day-cell.weekend {
  background: linear-gradient(145deg, #FFFDF5 0%, #FFF8DC 100%);
  border-color: rgba(255,228,160,0.6); border-style: dashed;
}
.day-cell.weekend:hover:not(.locked) {
  transform:translateY(-4px); box-shadow: 0 10px 28px rgba(255,204,102,0.25);
  border-color: var(--yellow-deep);
}
.day-cell.weekend.done { background: linear-gradient(145deg, #E8F8F0 0%, #B5EAD7 100%); border-color: #90D5BB; }
.day-cell.weekend.current {
  border-color: var(--yellow-deep); box-shadow: 0 0 0 6px rgba(255,204,102,0.25);
  animation: cellPulse 2.2s ease-in-out infinite;
}
.day-cell.weekend.locked { background: linear-gradient(145deg, #F0EDE8 0%, #E8E0D8 100%); opacity:0.5; cursor:not-allowed; }

@keyframes cellPulse {
  0%,100% { box-shadow: 0 0 0 4px rgba(255,154,162,0.15); }
  50% { box-shadow: 0 0 0 14px rgba(255,154,162,0); }
}

/* ========== 学习日页面 ========== */
.learn-container { max-width:680px; margin:0 auto; padding:0 16px; position:relative; z-index:1; }

/* 进度条 */
.progress-wrap { margin: 16px 0; position:relative; }
.progress-bar {
  background: rgba(255,182,193,0.25);
  border-radius:12px; height:16px; overflow:hidden;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
}
.progress-fill {
  height:100%;
  background: linear-gradient(90deg, #FF9AA2, #FFB6C1, #FFC8D0);
  background-size: 200% 100%;
  border-radius:12px;
  transition: width 0.6s cubic-bezier(0.22,0.61,0.36,1);
  animation: shimmer 2s linear infinite;
  position:relative;
}
.progress-fill::after {
  content:''; position:absolute; top:2px; left:6px; right:6px; bottom:2px;
  background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, transparent 60%);
  border-radius:8px;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: 0 0; }
}

/* 阶段标签 */
.phase-tabs { display:flex; gap:8px; margin-bottom:14px; }
.phase-tab {
  flex:1; text-align:center; padding:10px 6px; border-radius:14px;
  font-size:13px; font-weight:600; transition:all 0.3s;
  background: rgba(255,255,255,0.5); color: var(--text-light);
}
.phase-tab.active { background: var(--pink-deep); color:#fff; box-shadow: 0 4px 12px rgba(255,154,162,0.35); }
.phase-tab.done { background: var(--success); color:var(--text); }

/* 讲堂卡片 */
.lecture-card {
  background: var(--card); backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: var(--radius-lg); padding: 24px;
  box-shadow: var(--shadow-lg); border: 1px solid rgba(255,255,255,0.6);
  border-left: 6px solid var(--pink-deep);
  margin-bottom: 16px;
  animation: cardIn 0.5s cubic-bezier(0.22,0.61,0.36,1);
  position:relative; overflow:hidden;
}
.lecture-card::before {
  content:''; position:absolute; top:-30px; right:-30px;
  width:80px; height:80px; background: var(--pink-glow);
  border-radius:50%; opacity:0.3;
}
@keyframes cardIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
.lecture-card h2 { font-size:20px; margin-bottom:12px; color:var(--pink-deep); position:relative; }
.lecture-card .teacher-bubble {
  background: linear-gradient(135deg, #FFF8DC, #FFFDF5);
  border-radius: 16px; padding: 16px 20px; font-size:15px;
  line-height:1.8; position:relative; border: 1px solid rgba(255,228,160,0.5);
}
.lecture-card .example-box {
  background: linear-gradient(135deg, #F0F4FF, #F5F8FF);
  border-radius: 14px; padding: 14px 18px; margin-top: 12px;
  font-size:17px; text-align:center; font-weight:600;
  border: 1px solid rgba(181,216,255,0.5);
}

/* 练习区 */
.practice-area {
  background: var(--card); backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: var(--radius-lg); padding: 22px;
  box-shadow: var(--shadow-lg); border: 1px solid rgba(255,255,255,0.6);
  margin-bottom: 16px; animation: cardIn 0.5s 0.1s both;
}
.practice-area h3 { font-size:17px; margin-bottom:14px; }
.question-box {
  background: linear-gradient(135deg, #F5F8FF, #F0F4FF);
  border-radius: 16px; padding: 22px; text-align:center;
  font-size:30px; font-weight:700; margin-bottom: 16px; min-height:80px;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  letter-spacing: 2px; transition:all 0.3s; border: 1px solid rgba(181,216,255,0.3);
}
.question-box.shake { animation: shake 0.5s ease; }
@keyframes shake {
  0%,100% { transform:translateX(0); }
  20% { transform:translateX(-8px); }
  40% { transform:translateX(8px); }
  60% { transform:translateX(-5px); }
  80% { transform:translateX(5px); }
}
.question-box.bounce { animation: qBounce 0.5s ease; }
@keyframes qBounce {
  0% { transform:scale(1); }
  40% { transform:scale(1.08); }
  70% { transform:scale(0.95); }
  100% { transform:scale(1); }
}

.answer-row { display:flex; gap:12px; align-items:center; justify-content:center; flex-wrap:wrap; }
.answer-input {
  width:110px; height:60px; font-size:30px; text-align:center;
  border: 3px solid rgba(255,182,193,0.5); border-radius: 16px;
  background: rgba(255,255,255,0.8); color: var(--text); font-weight:700;
  outline:none; font-family: var(--font);
  transition: all 0.3s; box-shadow: var(--shadow-sm);
}
.answer-input:focus {
  border-color: var(--pink-deep);
  box-shadow: 0 0 0 6px rgba(255,154,162,0.15);
  transform:scale(1.03);
}
.btn {
  padding: 12px 28px; font-size:17px; font-weight:700;
  border:none; border-radius: 16px; cursor:pointer;
  transition: all 0.25s cubic-bezier(0.22,0.61,0.36,1);
  font-family: var(--font); position:relative; overflow:hidden;
  box-shadow: var(--shadow-sm);
}
.btn::after {
  content:''; position:absolute; top:50%; left:50%;
  width:0; height:0; border-radius:50%;
  background:rgba(255,255,255,0.4); transition:all 0.5s;
  transform:translate(-50%,-50%);
}
.btn:active::after { width:300px; height:300px; }
.btn:active { transform:scale(0.94); }
.btn-primary { background: linear-gradient(135deg, #FF9AA2, #FFB6C1); color:#fff; }
.btn-primary:hover { box-shadow: 0 6px 20px rgba(255,154,162,0.4); transform:translateY(-2px); }
.btn-secondary { background: linear-gradient(135deg, #B5D8FF, #D0E8FF); color:var(--text); }
.btn-secondary:hover { box-shadow: 0 6px 20px rgba(181,216,255,0.5); transform:translateY(-2px); }
.btn-yellow { background: linear-gradient(135deg, #FFE4A0, #FFD066); color:var(--text); }
.btn-yellow:hover { box-shadow: 0 6px 20px rgba(255,204,102,0.4); transform:translateY(-2px); }
.btn-success { background: linear-gradient(135deg, #B5EAD7, #C8F5E5); color:var(--text); }
.btn-success:hover { box-shadow: 0 6px 20px rgba(181,234,215,0.5); transform:translateY(-2px); }
.btn:disabled { opacity:0.5; cursor:not-allowed; transform:none !important; }

.feedback-box {
  padding: 14px 18px; border-radius: 16px; text-align:center;
  font-weight:700; font-size:18px; margin-top:12px;
  display:none; transition:all 0.3s;
}
.feedback-box.show { display:block; animation: popIn 0.4s cubic-bezier(0.68,-0.55,0.27,1.55); }
.feedback-box.correct { background: linear-gradient(135deg, #B5EAD7, #D4F5E8); color:#2D6A4F; }
.feedback-box.wrong { background: linear-gradient(135deg, #FFC4BF, #FFD9D5); color:#8B3A3A; }
@keyframes popIn {
  0% { transform:scale(0.5); opacity:0; }
  100% { transform:scale(1); opacity:1; }
}

/* 擂区 */
.arena-card {
  background: linear-gradient(145deg, rgba(255,255,255,0.85), rgba(255,248,220,0.7));
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-lg);
  margin-bottom: 20px; text-align:center;
  border: 2px solid rgba(255,228,160,0.5); animation: cardIn 0.5s 0.2s both;
  position:relative; overflow:hidden;
}
.arena-card::before {
  content:'⚡'; position:absolute; top:10px; right:16px; font-size:24px;
  animation: iconBounce 1.5s ease-in-out infinite;
}
.arena-card h3 { font-size:18px; margin-bottom:4px; }
.arena-card .timer {
  font-size:52px; font-weight:800; color:var(--pink-deep);
  margin:10px 0; font-variant-numeric:tabular-nums;
  text-shadow: 0 2px 8px rgba(255,154,162,0.2);
}
.arena-card .timer.urgent { animation: timerPulse 0.5s ease-in-out infinite; color:#FF6B6B; }
@keyframes timerPulse {
  0%,100% { transform:scale(1); }
  50% { transform:scale(1.08); }
}

/* ========== 周末任务卡 ========== */
.weekend-container { max-width:600px; margin:0 auto; padding:16px; position:relative; z-index:1; }
.task-card {
  background: var(--card); backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: var(--radius-lg); padding: 28px;
  box-shadow: var(--shadow-lg); border-top: 8px solid var(--yellow-deep);
  text-align:center; animation: cardIn 0.5s ease;
}
.task-card .task-icon { font-size:72px; margin-bottom:12px; animation: iconBounce 2s ease-in-out infinite; display:inline-block; }
.task-card h2 { font-size:22px; margin-bottom:6px; }
.task-card .task-theme { font-size:15px; color:var(--text-light); margin-bottom:16px; }
.task-card .task-desc {
  background: linear-gradient(135deg, #FFF8DC, #FFFDF5);
  border-radius: 14px; padding: 18px; text-align:left;
  font-size:15px; line-height:1.8; margin-bottom:8px;
  border: 1px solid rgba(255,228,160,0.4);
}
.task-card .task-checklist { text-align:left; margin:12px 0; list-style:none; }
.task-card .task-checklist li {
  padding:8px 0; font-size:15px; border-bottom:1px dashed rgba(0,0,0,0.05);
  display:flex; align-items:flex-start; gap:8px;
}
.task-card .task-checklist li::before { content:'✅'; flex-shrink:0; }

/* ========== 庆祝粒子 ========== */
.confetti-container { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:200; }
.confetti {
  position:absolute; width:12px; height:12px; border-radius:3px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform:translateY(-60px) rotate(0deg) scale(1); opacity:1; }
  80% { opacity:1; }
  100% { transform:translateY(105vh) rotate(720deg) scale(0.3); opacity:0; }
}
.star-burst {
  position:fixed; pointer-events:none; z-index:200;
  font-size:36px;
  animation: starFly 1.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
}
@keyframes starFly {
  0% { opacity:1; transform:translate(0,0) scale(0.3) rotate(0deg); }
  60% { opacity:1; transform:translate(var(--dx),var(--dy)) scale(1.4) rotate(180deg); }
  100% { opacity:0; transform:translate(var(--dx),calc(var(--dy) - 40px)) scale(0.2) rotate(360deg); }
}

/* ========== 弹窗 ========== */
.modal-overlay {
  position:fixed; top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.35); z-index:150;
  display:none; align-items:center; justify-content:center;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
.modal-overlay.show { display:flex; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal-box {
  background: var(--card-solid); border-radius: var(--radius-lg);
  padding: 36px 28px; text-align:center; max-width:380px; width:90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.18);
  animation: modalPop 0.4s cubic-bezier(0.68,-0.55,0.27,1.55);
}
@keyframes modalPop { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
.modal-box h2 { margin-bottom:12px; font-size:24px; }
.modal-box .big-emoji { font-size:64px; display:inline-block; animation: iconBounce 1s ease-in-out infinite; }

/* ========== 徽章墙 ========== */
.badges-grid {
  display:flex; flex-wrap:wrap; gap:14px; justify-content:center; padding:20px;
}
.badge-item {
  width:88px; height:100px;
  background: var(--card); backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 16px; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  box-shadow: var(--shadow); font-size:11px; font-weight:600;
  text-align:center; gap:4px; transition:all 0.3s;
  border: 1px solid rgba(255,255,255,0.5);
}
.badge-item:not(.locked):hover { transform:translateY(-4px); box-shadow: var(--shadow-lg); }
.badge-item.locked { opacity:0.35; filter:grayscale(1); }
.badge-item .badge-icon { font-size:34px; }
.badge-item.unlock-anim { animation: badgeUnlock 0.8s cubic-bezier(0.68,-0.55,0.27,1.55); }
@keyframes badgeUnlock {
  0% { transform:scale(0) rotate(-180deg); opacity:0; }
  60% { transform:scale(1.3) rotate(10deg); }
  100% { transform:scale(1) rotate(0deg); opacity:1; }
}

/* ========== 返回按钮 ========== */
.back-btn {
  padding:8px 18px; background: rgba(255,255,255,0.7);
  border:none; border-radius:12px; font-size:15px; cursor:pointer;
  font-family: var(--font); font-weight:600; color: var(--text);
  transition:all 0.3s; box-shadow: var(--shadow-sm);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.back-btn:hover { background:var(--pink-light); transform:translateX(-2px); }

/* ========== 底部导航 ========== */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background: rgba(255,255,255,0.82); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display:flex; justify-content:space-around; padding: 8px 0 12px;
  border-top: 1px solid rgba(255,182,193,0.25); z-index:100;
  box-shadow: 0 -2px 16px rgba(0,0,0,0.04);
}
.bottom-nav .nav-item {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  cursor:pointer; font-size:11px; font-weight:600; color: var(--text-light);
  padding: 6px 16px; border-radius: 14px; transition:all 0.3s;
}
.bottom-nav .nav-item.active { color: var(--pink-deep); background: rgba(255,182,193,0.2); }
.bottom-nav .nav-item .nav-icon { font-size:22px; transition:transform 0.3s; }
.bottom-nav .nav-item:active .nav-icon { transform:scale(1.3); }
.spacer { height:80px; }

/* ========== 安装提示 ========== */

<!-- 庆祝粒子容器 -->

<!-- 安装提示 -->

<script>
// ============================================================
// 背景装饰
// ============================================================
(function initBg() {
  const container = document.getElementById('bgDeco');
  const colors = ['#FFD1D7','#FFE4A0','#B5D8FF','#FFE8EA','#FFF0C0','#C8E5FF','#FFDDE0','#FFE8C0'];
  for (let i=0;i<18;i++) {
    const el = document.createElement('div');
    el.className = 'bg-float';
    const size = 20 + Math.random()*60;
    el.style.cssText = `
      width:${size}px; height:${size}px; left:${Math.random()*100}%;
      top:${Math.random()*100}%; background:${colors[i%colors.length]};
      animation-duration:${12+Math.random()*18}s;
      animation-delay:${-Math.random()*20}s;
    `;
    container.appendChild(el);
  }
})();

// ============================================================
// 粒子/庆祝动画
// ============================================================
function spawnConfetti(count=40) {
  const container = document.getElementById('confettiContainer');
  const colors = ['#FF9AA2','#FFB6C1','#FFD700','#B5EAD7','#B5D8FF','#FFE4A0','#FF8A98','#FFCC66'];
  for (let i=0;i<count;i++) {
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti';
      el.style.cssText = `
        left:${10+Math.random()*80}%; top:-20px;
        width:${8+Math.random()*14}px; height:${6+Math.random()*16}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${1.5+Math.random()*2.5}s;
        animation-delay:${Math.random()*0.3}s;
        border-radius:${Math.random()>0.5?'50%':'2px'};
      `;
      container.appendChild(el);
      setTimeout(()=>el.remove(), 3000);
    }, i*15);
  }
}

function spawnStars(count=5) {
  for (let i=0;i<count;i++) {
    setTimeout(()=>{
      const star=document.createElement('div');
      star.className='star-burst';
      star.textContent='⭐';
      star.style.left=20+Math.random()*60+'%';
      star.style.top=25+Math.random()*40+'%';
      star.style.setProperty('--dx',(Math.random()-0.5)*200+'px');
      star.style.setProperty('--dy',-(80+Math.random()*150)+'px');
      document.body.appendChild(star);
      setTimeout(()=>star.remove(),1500);
    }, i*80);
  }
}

function shakeElement(el) {
  el.classList.add('shake');
  setTimeout(()=>el.classList.remove('shake'),500);
}

function bounceElement(el) {
  el.classList.add('bounce');
  setTimeout(()=>el.classList.remove('bounce'),500);
}

// 题目生成
// ============================================================
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=rand(0,i);[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function generateQuestion(dayId, levelIdx){
  const day=STUDY_DAYS[dayId]; if(!day) return {q:'?',a:0};
  const lvl=day.levels[Math.min(levelIdx,day.levels.length-1)];
  const t=lvl.type;
  switch(t){
    case 'compare':{const a=rand(1,20),b=rand(1,20);return{q:`哪个数更大？<br><span style="font-size:40px;">${a} 和 ${b}</span>`,a:Math.max(a,b)};}
    case 'ordinal':{
      const n=rand(5,10),pos=rand(1,n);
      const animals=['🐱小猫','🐶小狗','🐰小兔','🐻小熊','🐸青蛙','🐵小猴','🦊狐狸','🐼熊猫','🐨考拉','🐯老虎'];
      const list=shuffle([...animals]).slice(0,n);
      return{q:`小动物排队：<br>${list.join(' ')}<br><br><b>${list[pos-1]}</b>从左边数是第几个？`,a:pos};
    }
    case 'pattern':{
      const ps=[[1,3,5,7,9],[2,4,6,8,10],[10,8,6,4,2],[5,10,15,20,25],[1,4,7,10,13],[20,17,14,11,8],[3,6,9,12,15]];
      const p=ps[rand(0,ps.length-1)];
      return{q:`找规律：${p.slice(0,4).join(', ')}, ? <br>下一个是几？`,a:p[4]};
    }
    case 'fillAdd':{const b=rand(1,9),ans=rand(1,10-b);return{q:`${b} + ? = ${b+ans}`,a:ans};}
    case 'fillSub':{const a=rand(3,10),ans=rand(1,a-1);return{q:`${a} - ? = ${a-ans}`,a:ans};}
    case 'sudoku3':{
      const ps=[{q:'1 _<br>_ 2<br>空格填几？',a:2},{q:'_ 2<br>1 _<br>空格填几？',a:2},{q:'1 _<br>2 _<br>第二行空格填几？',a:1}];
      return ps[rand(0,ps.length-1)];
    }
    case 'chainAdd':{const a=rand(0,5),b=rand(0,5),c=rand(1,5);return{q:`${a}+${b}+${c}=?`,a:a+b+c};}
    case 'chainSub':{const a=rand(6,12),b=rand(1,a-2),c=rand(1,a-b-1);return{q:`${a}-${b}-${c}=?`,a:a-b-c};}
    case 'chainMix':{
      const r=rand(0,1);
      if(r===0){const a=rand(2,8),b=rand(1,12-a),c=rand(1,a+b-1);return{q:`${a}+${b}-${c}=?`,a:a+b-c};}
      else{const a=rand(5,12),b=rand(1,a-1),c=rand(1,6);return{q:`${a}-${b}+${c}=?`,a:a-b+c};}
    }
    case 'wordProblem':{
      const cat=lvl.category==='mix'?(rand(0,1)?'add':'sub'):lvl.category;
      if(cat==='add'){const a=rand(3,10),b=rand(2,10);const ss=[`树上有${a}只小鸟，又飞来${b}只，一共几只？`,`小明有${a}块糖，妈妈又给${b}块，一共几块？`];return{q:ss[rand(0,ss.length-1)],a:a+b};}
      else{const a=rand(4,15),b=rand(1,a-1);const ss=[`妈妈买${a}个苹果，吃${b}个，剩几个？`,`池塘有${a}条鱼，游走${b}条，剩几条？`];return{q:ss[rand(0,ss.length-1)],a:a-b};}
    }
    case 'shapeId':{
      const s=lvl.shapes[rand(0,lvl.shapes.length-1)];
      return{q:`哪个是<b>${s}</b>？`,a:s,type:'choice',choices:[{label:'A',val:lvl.shapes[0]},{label:'B',val:lvl.shapes[1]},{label:'C',val:lvl.shapes[2]},{label:'D',val:lvl.shapes[3]}]};
    }
    case 'shapeReal':{
      const its=[['冰箱','长方体'],['骰子','正方体'],['水杯','圆柱'],['篮球','球'],['鞋盒','长方体'],['魔方','正方体']];
      const it=its[rand(0,its.length-1)];
      return{q:`<b>${it[0]}</b>是什么形状？`,a:it[1],type:'choice',choices:[{label:'A',val:'长方体'},{label:'B',val:'正方体'},{label:'C',val:'圆柱'},{label:'D',val:'球'}]};
    }
    case 'shapeBuild':{
      const qs=[{q:'2个正方体拼一起是什么体？',a:'长方体',choices:[{label:'A',val:'长方体'},{label:'B',val:'正方体'},{label:'C',val:'圆柱'},{label:'D',val:'球'}]},{q:'至少几个小正方体拼成大正方体？',a:8,choices:[{label:'A',val:4},{label:'B',val:6},{label:'C',val:8},{label:'D',val:10}]}];
      return qs[rand(0,qs.length-1)];
    }
    case 'position':{
      const objs=['🍎苹果','📚书','🧸玩具熊','🚗小车','⚽皮球'];
      const sh=shuffle([...objs]).slice(0,5);
      if(lvl.dim==='updown'){
        const refIdx=rand(0,4),targetIdx=2;
        const ans=targetIdx<refIdx?'上面':'下面';
        return{q:`架子上：<br>🔝${sh[0]}<br>　${sh[1]}<br>　${sh[2]}<br>　${sh[3]}<br>🔚${sh[4]}<br><br><b>${sh[2]}</b>在<b>${sh[refIdx]}</b>的上面还是下面？`,a:ans,type:'choice',choices:[{label:'A',val:'上面'},{label:'B',val:'下面'}]};
      }else{
        const hand=rand(0,1)?'左手':'右手',ans=hand==='左手'?'左边':'右边';
        return{q:`你的<b>${hand}</b>在哪边？`,a:ans,type:'choice',choices:[{label:'A',val:'左边'},{label:'B',val:'右边'}]};
      }
    }
    case 'maze':{

function renderMap(){
  const grid=document.getElementById('daysGrid'); grid.innerHTML='';
  MAP_DAYS.forEach((d,i)=>{
    const cell=document.createElement('div');
    cell.className='day-cell '+d.type;
    const completed=STATE.dayStars[i]!==undefined;
    const unlocked=i<=STATE.currentDay;
    const isCurrent=i===STATE.currentDay&&!completed;
    if(completed)cell.classList.add('done');
    else if(isCurrent)cell.classList.add('current');
    else if(!unlocked)cell.classList.add('locked');
    const stars=STATE.dayStars[i]||0;
    const starStr=completed?'⭐'.repeat(stars)+'☆'.repeat(3-stars):'';
    cell.innerHTML=`
      <div class="day-num">${d.type==='study'?'📖':'🎪'}</div>
      <div style="font-size:11px;">第${i+1}天</div>
      <div class="day-label">${d.type==='study'?d.data.topic.split(' ')[1]:d.data.theme}</div>
      ${starStr?`<div class="stars-row">${starStr}</div>`:''}
      ${!unlocked?'<div style="font-size:18px;">🔒</div>':''}
    `;
    if(unlocked)cell.onclick=()=>{if(d.type==='study')openStudyDay(i);else openWeekendDay(i);};
    grid.appendChild(cell);
  });
  document.getElementById('totalStars').textContent=STATE.totalStars;
  document.getElementById('totalScore').textContent=STATE.totalScore;
}

function openStudyDay(mapIndex){
  STATE._mapIndex=mapIndex;
  const day=MAP_DAYS[mapIndex]; STATE._studyDay=day;
  document.getElementById('learnTitle').textContent=`📖 第${mapIndex+1}天 · ${day.data.topic}`;
  document.getElementById('teacherContent').innerHTML=day.data.lecture;
  document.getElementById('exampleContent').innerHTML=day.data.example;
  document.getElementById('learnProgress').style.width='0%';
  document.getElementById('levelTitle').textContent='🎯 第1关：'+day.data.levels[0].name;
  document.getElementById('questionBox').innerHTML='准备好了吗？<br>点击确认开始闯关！';
  document.getElementById('answerInput').value=''; document.getElementById('answerInput').style.display='inline-block';
  document.getElementById('feedbackBox').className='feedback-box';
  document.getElementById('submitBtn').disabled=false;
  document.getElementById('finishDayBtn').style.display='none';
  document.getElementById('levelStars').textContent='⭐⭐⭐';
  document.getElementById('answerRow').style.display='flex';
  document.getElementById('answerRow').innerHTML=`
    <input class="answer-input" type="number" id="answerInput" placeholder="?" autocomplete="off" inputmode="numeric">
    <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()">确认 ✓</button>
  `;
  resetArena();
  document.getElementById('arenaTimer').textContent='2:00';
  document.getElementById('arenaTimer').classList.remove('urgent');
  document.getElementById('arenaScoreDisplay').textContent='得分：0';
  document.getElementById('arenaQuestion').innerHTML='准备好了吗？';
  document.getElementById('arenaInput').value='';
  document.getElementById('arenaSubmit').disabled=false;
  document.getElementById('arenaSubmit').textContent='开始挑战！';
  document.getElementById('arenaFeedback').className='feedback-box';
  // 重置阶段标签
  ['phaseTab0','phaseTab1','phaseTab2'].forEach(id=>document.getElementById(id).classList.remove('active','done'));
  document.getElementById('phaseTab0').classList.add('active');
  STATE.learnPhase='lecture'; STATE.currentLevel=0; STATE._levelStars=[0,0,0];
  STATE.levelCorrect=0; STATE.levelWrong=0; STATE.levelTotal=0; STATE.currentQuestion=null;
  switchPage('page-learn'); updateLearnStats();
  setTimeout(()=>document.getElementById('lectureCard').scrollIntoView({behavior:'smooth'}),200);
}

function updatePhaseTabs(){
  ['phaseTab0','phaseTab1','phaseTab2'].forEach((id,i)=>{
    const el=document.getElementById(id); el.classList.remove('active','done');
    if(STATE.learnPhase==='lecture'){if(i===0)el.classList.add('active');}
    else if(STATE.learnPhase==='level'){if(i===0)el.classList.add('done'); if(i===1)el.classList.add('active');}
    else if(STATE.learnPhase==='arena'){el.classList.add(i<2?'done':''); if(i===2)el.classList.add('active');}
    else if(STATE.learnPhase==='done'){el.classList.add('done');}
  });
}

function nextLevel(day){
  const lvl=day.data.levels[STATE.currentLevel];
  STATE.levelTotal=0; STATE.levelCorrect=0; STATE.levelWrong=0;
  STATE.currentQuestion=generateQuestion(day.data.id-1,STATE.currentLevel);
  document.getElementById('levelTitle').textContent=`🎯 第${STATE.currentLevel+1}关：${lvl.name}`;
  document.getElementById('questionBox').innerHTML=STATE.currentQuestion.q;
  document.getElementById('answerInput').value='';
  document.getElementById('feedbackBox').className='feedback-box';
  document.getElementById('levelStars').textContent='⭐⭐⭐';
  const row=document.getElementById('answerRow');
  if(STATE.currentQuestion.type==='choice'){
    renderChoices(STATE.currentQuestion,row);
    document.getElementById('answerInput').style.display='none';
  }else{
    row.innerHTML=`
      <input class="answer-input" type="number" id="answerInput" placeholder="?" autocomplete="off" inputmode="numeric">
      <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()">确认 ✓</button>
    `;
    document.getElementById('answerInput').style.display='inline-block';
    setTimeout(()=>document.getElementById('answerInput').focus(),300);
  }
  document.getElementById('submitBtn').disabled=false;
}

function renderChoices(q,row){
  row.innerHTML='';
  q.choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='btn btn-secondary'; btn.textContent=c.label+'. '+c.val;
    btn.style.margin='4px'; btn.onclick=()=>submitChoice(c.val,q);
    row.appendChild(btn);
  });
}

function submitChoice(val,q){
  STATE.levelTotal++;
  if(val===q.a){STATE.levelCorrect++;showFeedback(true,q.displayAns||q.a);spawnStars(2);}
  else{STATE.levelWrong++;showFeedback(false,q.displayAns||q.a);shakeElement(document.getElementById('questionBox'));}
  nextAfterFeedback();
}

function submitAnswer(){
  if(STATE.learnPhase==='lecture'){
    STATE.learnPhase='level'; STATE.currentLevel=0; updatePhaseTabs(); updateProgress();
    nextLevel(STATE._studyDay); return;
  }
  if(STATE.learnPhase==='done')return;
  const input=document.getElementById('answerInput');
  if(!input)return;
  const ans=input.value.trim(); if(ans==='')return;
  const q=STATE.currentQuestion; if(q.type==='choice')return;
  STATE.levelTotal++;
  const correct=String(ans)===String(q.a);
  if(correct){STATE.levelCorrect++;showFeedback(true,q.displayAns||q.a);spawnStars(2);bounceElement(document.getElementById('questionBox'));}
  else{STATE.levelWrong++;showFeedback(false,q.displayAns||q.a);shakeElement(document.getElementById('questionBox'));}
  nextAfterFeedback();
}

function nextAfterFeedback(){
  setTimeout(()=>{
    const day=STATE._studyDay; const lvl=day.data.levels[STATE.currentLevel];
    if(STATE.levelTotal>=lvl.count){
      const accuracy=STATE.levelCorrect/Math.max(STATE.levelTotal,1);
      const stars=accuracy>=0.9?3:accuracy>=0.7?2:1;
      STATE._levelStars[STATE.currentLevel]=stars;
      const starDisplay='⭐'.repeat(stars)+'☆'.repeat(3-stars);
      document.getElementById('levelStars').textContent=starDisplay;
      document.getElementById('feedbackBox').className='feedback-box show correct';
      document.getElementById('feedbackBox').innerHTML=`🎉 第${STATE.currentLevel+1}关完成！获得 ${stars} 颗星！`;
      spawnConfetti(25);
      if(STATE.currentLevel<day.data.levels.length-1){
        STATE.currentLevel++; updatePhaseTabs(); updateProgress();
        setTimeout(()=>nextLevel(day),1400);
      }else{
        STATE.learnPhase='arena'; updatePhaseTabs(); updateProgress();
        document.getElementById('phaseTab1').classList.add('done');
        document.getElementById('phaseTab2').classList.add('active');
        document.getElementById('questionBox').innerHTML='🎊 三关全过！来趣味擂台挑战吧！';
        document.getElementById('answerRow').style.display='none';
        document.getElementById('submitBtn').disabled=true;
        setTimeout(()=>document.getElementById('arenaCard').scrollIntoView({behavior:'smooth'}),500);
      }
    }else{
      STATE.currentQuestion=generateQuestion(day.data.id-1,STATE.currentLevel);
      document.getElementById('questionBox').innerHTML=STATE.currentQuestion.q;
      document.getElementById('answerInput').value='';
      document.getElementById('feedbackBox').className='feedback-box';
      const row=document.getElementById('answerRow');
      if(STATE.currentQuestion.type==='choice'){
        renderChoices(STATE.currentQuestion,row);
      }else{
        row.innerHTML=`
          <input class="answer-input" type="number" id="answerInput" placeholder="?" autocomplete="off" inputmode="numeric">
          <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()">确认 ✓</button>
        `;
        setTimeout(()=>document.getElementById('answerInput').focus(),200);
      }
      document.getElementById('submitBtn').disabled=false;
    }
  },1000);
}

function showFeedback(correct,answer){
  const fb=document.getElementById('feedbackBox');
  fb.className='feedback-box show '+(correct?'correct':'wrong');
  fb.innerHTML=correct?['✅ 太棒了！','🌟 真厉害！','👏 答对了！','💪 非常棒！','🎯 正确！'][rand(0,4)]:`❌ 不对哦～答案是 <b>${answer}</b>，加油！`;
}

function updateProgress(){
  const totalLevels=STATE._studyDay.data.levels.length;
  let p=0;
  if(STATE.learnPhase==='lecture')p=0;
  else if(STATE.learnPhase==='level')p=((STATE.currentLevel)/(totalLevels+1))*100;
  else if(STATE.learnPhase==='arena')p=(totalLevels/(totalLevels+1))*100;
  else if(STATE.learnPhase==='done')p=100;
  document.getElementById('learnProgress').style.width=p+'%';
}

function updateLearnStats(){
  const stars=STATE.dayStars[STATE._mapIndex]||0;
  document.getElementById('learnStats').innerHTML=`<span class="stat"><span class="icon">⭐</span>${stars}/3</span>`;
}

// ========== 擂台 ==========
function resetArena(){
  if(STATE.arenaTimer)clearInterval(STATE.arenaTimer);
  STATE.arenaActive=false; STATE.arenaScore=0; STATE.arenaCorrect=0; STATE.arenaSeconds=120; STATE.arenaTimer=null;
}
function submitArena(){
  if(!STATE.arenaActive){
    STATE.arenaActive=true; STATE.arenaScore=0; STATE.arenaCorrect=0; STATE.arenaSeconds=120;
    document.getElementById('arenaSubmit').textContent='GO!';
    document.getElementById('arenaScoreDisplay').textContent='得分：0';
    document.getElementById('arenaTimer').classList.remove('urgent');
    startArenaTimer(); nextArenaQuestion(); return;
  }
  const input=document.getElementById('arenaInput'); if(!input)return;
  const ans=input.value.trim(); if(ans===''||!STATE.arenaQuestion)return;
  const correct=String(ans)===String(STATE.arenaQuestion.a);
  const fb=document.getElementById('arenaFeedback');
  if(correct){
    STATE.arenaCorrect++; STATE.arenaScore+=10;
    fb.className='feedback-box show correct'; fb.innerHTML='✅ +10分！';
    document.getElementById('arenaScoreDisplay').textContent=`得分：${STATE.arenaScore}`;
    spawnStars(1);
  }else{
    fb.className='feedback-box show wrong';
    fb.innerHTML=`❌ 答案是 ${STATE.arenaQuestion.displayAns||STATE.arenaQuestion.a}`;
    shakeElement(document.getElementById('arenaQuestion'));
  }
  input.value='';
  setTimeout(()=>{fb.className='feedback-box'; nextArenaQuestion();},500);
}
function startArenaTimer(){
  STATE.arenaTimer=setInterval(()=>{
    STATE.arenaSeconds--;
    const m=Math.floor(STATE.arenaSeconds/60),s=STATE.arenaSeconds%60;
    document.getElementById('arenaTimer').textContent=m+':'+String(s).padStart(2,'0');
    if(STATE.arenaSeconds<=15)document.getElementById('arenaTimer').classList.add('urgent');
    if(STATE.arenaSeconds<=0)endArena();
  },1000);
}
function nextArenaQuestion(){
  if(!STATE.arenaActive)return;
  const a=rand(1,20),b=rand(1,9),op=rand(0,1)?'+':'-';
  STATE.arenaQuestion=op==='+'?{q:`${a}+${b}=?`,a:a+b}:{q:`${Math.max(a,b)}-${Math.min(a,b)}=?`,a:Math.abs(a-b)};
  document.getElementById('arenaQuestion').innerHTML=`<span style="font-size:28px;">${STATE.arenaQuestion.q}</span>`;
  document.getElementById('arenaInput').value=''; document.getElementById('arenaInput').focus();
}
function endArena(){
  STATE.arenaActive=false; if(STATE.arenaTimer)clearInterval(STATE.arenaTimer);
  STATE.arenaTotal+=STATE.arenaScore;
  document.getElementById('arenaTimer').textContent='0:00';
  document.getElementById('arenaTimer').classList.remove('urgent');
  document.getElementById('arenaQuestion').innerHTML='🏁 时间到！';
  document.getElementById('arenaSubmit').disabled=true;
  document.getElementById('arenaFeedback').className='feedback-box show correct';
  document.getElementById('arenaFeedback').innerHTML=`⚡ 擂台得分：<b>${STATE.arenaScore}</b> 分！`;
  document.getElementById('finishDayBtn').style.display='inline-block';
  STATE.learnPhase='done'; updatePhaseTabs(); updateProgress();
  document.getElementById('learnProgress').style.width='100%';
  spawnConfetti(50); saveState(); renderMap();
}
function finishDay(){
  const mapIdx=STATE._mapIndex;
  // 综合三关星星
  const levelAvg=STATE._levelStars.reduce((a,b)=>a+b,0)/3;
  let dayStars=STATE.arenaScore>=30?3:STATE.arenaScore>=10?2:1;
  dayStars=Math.max(dayStars,Math.round(levelAvg));
  STATE.dayStars[mapIdx]=dayStars;
  STATE.totalStars=Object.values(STATE.dayStars).reduce((a,b)=>a+b,0);
  STATE.totalScore+=STATE.arenaScore+dayStars*5;
  STATE.completedDays=Object.keys(STATE.dayStars).length;
  if(mapIdx===STATE.currentDay&&STATE.currentDay<29)STATE.currentDay=mapIdx+1;
  checkBadges(); saveState(); updateLearnStats();
  showModal('🎉','太棒了！',`今天获得 <b>${dayStars}</b> 颗星 ⭐<br>擂台得分 <b>${STATE.arenaScore}</b> 分 ⚡<br><br>第${mapIdx+1}天挑战完成！`,()=>{goMap();});
}

// ========== 周末 ==========
function openWeekendDay(mapIndex){
  STATE._mapIndex=mapIndex; const d=MAP_DAYS[mapIndex]; STATE._weekendDay=d;
  document.getElementById('weekendTitle').textContent=`🎪 第${mapIndex+1}天 · ${d.data.theme}`;
  document.getElementById('taskCard').innerHTML=`
    <div class="task-icon">${d.data.icon}</div>
    <h2>${d.data.theme}</h2><div class="task-theme">${d.data.desc}</div>
    <div class="task-desc"><ol class="task-checklist">${d.data.tasks.map(t=>`<li>${t}</li>`).join('')}</ol></div>
    <div style="margin-top:14px;padding:12px;background:linear-gradient(135deg,#F0F4FF,#F5F8FF);border-radius:12px;font-size:14px;text-align:left;">${d.data.tip}</div>`;
  document.getElementById('finishWeekendBtn').style.display=STATE.dayStars[mapIndex]!==undefined?'none':'inline-block';
  switchPage('page-weekend');
}
function finishWeekend(){
  const mapIdx=STATE._mapIndex;
  STATE.dayStars[mapIdx]=3; STATE.totalStars=Object.values(STATE.dayStars).reduce((a,b)=>a+b,0);
  STATE.totalScore+=20; STATE.completedDays=Object.keys(STATE.dayStars).length;
  if(mapIdx===STATE.currentDay&&STATE.currentDay<29)STATE.currentDay=mapIdx+1;
  checkBadges(); saveState();
  document.getElementById('finishWeekendBtn').style.display='none';
  showModal('🌟','生活数学日完成！','和爸爸妈妈一起学数学<br>是最开心的事！<br><br>获得 <b>3</b> 颗星 ⭐',()=>goMap());
}

// ========== 徽章 ==========
function checkBadges(){
  BADGES.forEach(b=>{
    if(!STATE.badges[b.id]&&b.cond(STATE)){
      STATE.badges[b.id]=true;
      setTimeout(()=>showModal(b.icon,'新徽章解锁！',b.name+'<br>'+b.desc),800);
    }
  });
}
function renderBadges(){
  const grid=document.getElementById('badgesGrid'); grid.innerHTML='';
  BADGES.forEach(b=>{
    const div=document.createElement('div');
    div.className='badge-item'+(STATE.badges[b.id]?'':' locked');
    div.innerHTML=`<div class="badge-icon">${b.icon}</div><div>${b.name}</div>`;
    grid.appendChild(div);
  });
}

// ========== 弹窗 ==========
function showModal(icon,title,msg,onClose){
  document.getElementById('modalBox').innerHTML=`
    <div class="big-emoji">${icon}</div><h2>${title}</h2>
    <p style="line-height:1.8;font-size:16px;">${msg}</p>
    <button class="btn btn-primary" style="margin-top:16px;font-size:17px;padding:12px 36px;" onclick="closeModal()">好的！</button>`;
  document.getElementById('modalOverlay').classList.add('show');
  STATE._modalCallback=onClose;
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
  if(STATE._modalCallback){const cb=STATE._modalCallback;STATE._modalCallback=null;cb();}
}

// ========== 页面切换 ==========
function switchPage(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.querySelectorAll('.bottom-nav .nav-item').forEach(n=>n.classList.toggle('active',n.dataset.page===pageId));
  if(pageId==='page-map')renderMap();
  if(pageId==='page-badges')renderBadges();
  const hideNav=['page-learn','page-weekend'];
  document.getElementById('bottomNav').style.display=hideNav.includes(pageId)?'none':'flex';
}
function goMap(){switchPage('page-map');renderMap();}

// ========== PWA ==========
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBanner').style.display='block';});
window.installApp=function(){
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(r=>{if(r.outcome==='accepted')document.getElementById('installBanner').style.display='none';});}
  else{alert('📲 请点击浏览器菜单中的"添加到主屏幕"或"安装"按钮～');}
};
window.addEventListener('appinstalled',()=>{document.getElementById('installBanner').style.display='none';});

// ========== 键盘事件 ==========
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    const arenaInput=document.getElementById('arenaInput');
    if(arenaInput&&document.activeElement===arenaInput){submitArena();return;}
    const answerInput=document.getElementById('answerInput');
    if(answerInput&&document.activeElement===answerInput){submitAnswer();return;}
  }
});

// 弹窗遮罩关闭
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ========== 初始化 ==========
loadState(); renderMap();

// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(r=>console.log('✅ SW已注册')).catch(()=>{});
}

console.log('⭐ 护眼粉色系 · 玻璃拟态 · 粒子动画 · PWA离线可用');
